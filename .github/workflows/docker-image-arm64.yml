name: Publish Docker image (native amd64 + arm64)

on:
  push:
    tags:
      - "v*"

jobs:
  build_single_arch:
    name: Build & push (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}

    permissions:
      contents: read

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Resolve tag & write VERSION
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "TAG=$TAG" >> "$GITHUB_ENV"
          echo "$TAG" > VERSION
          echo "Building tag: $TAG for ${{ matrix.arch }}"

      - name: Set Docker image name
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          if [ -z "$DOCKERHUB_USERNAME" ]; then
            echo "DOCKERHUB_USERNAME is empty"
            exit 1
          fi
          echo "DOCKER_IMAGE=${DOCKERHUB_USERNAME,,}/new-api" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PAT }}

      - name: Extract metadata (labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.DOCKER_IMAGE }}

      - name: Build & push single-arch
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ env.TAG }}-${{ matrix.arch }}
            ${{ env.DOCKER_IMAGE }}:latest-${{ matrix.arch }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false

  create_manifests:
    name: Create multi-arch manifests (Docker Hub)
    needs: [build_single_arch]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Extract tag
        run: echo "TAG=${GITHUB_REF#refs/tags/}" >> "$GITHUB_ENV"

      - name: Set Docker image name
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          if [ -z "$DOCKERHUB_USERNAME" ]; then
            echo "DOCKERHUB_USERNAME is empty"
            exit 1
          fi
          echo "DOCKER_IMAGE=${DOCKERHUB_USERNAME,,}/new-api" >> "$GITHUB_ENV"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PAT }}

      - name: Create & push manifest (version)
        run: |
          docker buildx imagetools create \
            -t "${DOCKER_IMAGE}:${TAG}" \
            "${DOCKER_IMAGE}:${TAG}-amd64" \
            "${DOCKER_IMAGE}:${TAG}-arm64"

      - name: Create & push manifest (latest)
        run: |
          docker buildx imagetools create \
            -t "${DOCKER_IMAGE}:latest" \
            "${DOCKER_IMAGE}:latest-amd64" \
            "${DOCKER_IMAGE}:latest-arm64"
